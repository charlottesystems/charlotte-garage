<!-- SPLASH VIDEO OVERLAY -->
<div id="splashOverlay" style="
  position: fixed; inset: 0; z-index: 9999;
  background: black;
  display: flex; align-items: center; justify-content: center;
  opacity: 1; transition: opacity 1.5s ease;
">
  <video id="splashVideo" autoplay muted playsinline
    style="width:100%; height:100%; object-fit:cover; opacity:0.55;"
    src="URL_DEL_TUO_VIDEO.mp4">
  </video>
  <!-- Logo Charlotte sopra il video -->
  <div style="
    position: absolute;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  ">
    <img src="charlotte_icon.png" style="width:100px; filter: drop-shadow(0 0 20px #BF00FF);">
    <div style="
      font-family: serif; font-size: 3rem; color: white;
      letter-spacing: 0.4em;
      text-shadow: 0 0 30px #BF00FF, 0 0 60px #7B00A8;
      margin-top: 16px;
    ">CHARLOTTE</div>
  </div>
</div>

<script>
const video = document.getElementById('splashVideo');
const overlay = document.getElementById('splashOverlay');

video.addEventListener('ended', fadeOut);
setTimeout(fadeOut, 4000); // fallback

function fadeOut() {
  overlay.style.opacity = '0';
  setTimeout(() => overlay.remove(), 1500);
}
</script>
